<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ΔVとBプレーンでフライバイ作戦を考える非公式教育シミュレーション"
    />
    <title>Flyby Control Challenge</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="startup-help" hidden>
      <h1>Flyby Control Challenge</h1>
      <p>アプリの読み込みに失敗しました。ページを再読み込みしてください。</p>
      <p>
        JavaScriptが無効になっている、古いキャッシュが残っている、または一時的に読み込みに失敗した可能性があります。
      </p>
    </div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById("root");
        var help = document.getElementById("startup-help");
        if (root && help && root.childElementCount === 0) {
          help.hidden = false;
          help.style.cssText =
            "max-width:560px;margin:48px auto;padding:24px;border-radius:16px;" +
            "background:#102539;color:#eaf6ff;font-family:Segoe UI,sans-serif;line-height:1.7";
        }
      }, 1500);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
